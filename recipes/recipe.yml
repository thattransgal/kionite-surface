---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: kinoite-surface
description: A fedora atomic distro base on kinoite (kde) for Microsoft Surface devices.

base-image: ghcr.io/ublue-os/kinoite-main
image-version: 44

modules:
  - type: files
    files:
      - source: system
        destination: /
  - type: script
    snippets:
      - |
        curl -fsSL https://pkg.surfacelinux.com/fedora/linux-surface.repo \
          -o /etc/yum.repos.d/linux-surface.repo

        # Surface Linux has not published Fedora 44 packages yet.
        # Use Fedora 43 kernel packages instead.
        sed -i '/^baseurl=/ s/\$releasever/43/g' \
          /etc/yum.repos.d/linux-surface.repo

        rpm --import \
          https://raw.githubusercontent.com/linux-surface/linux-surface/master/pkg/keys/surface.asc


  # Replace Fedora kernel and selected applications
  - type: dnf
    remove:
      packages:
        # Replace Firefox RPM with Flatpak
        - firefox
        - firefox-langpacks

        # remove kde partition manager, and discover app store
        - kde-partitionmanager
        - plasma-discover
        - plasma-discover-rpm-ostree
        - plasma-discover-flatpak

        # Remove Fedora kernel packages
        - kernel
        - kernel-core
        - kernel-modules
        - kernel-modules-core
        - kernel-modules-extra

    install:
      packages:
        # Linux Surface kernel
        - kernel-surface

        # Surface hardware support
        - iptsd
        - thermald

        # Secure Boot support
        - surface-secureboot

        # Flatpak support
        - flatpak

        # tailscale fedora package
        - tailscale

        # other applications
        - gnome-disk-utility
        - mediawriter
        - filelight
        - yakuake

  # Wait for networking before services that need internet
  - type: systemd
    system:
      enabled:
        - NetworkManager-wait-online.service
        - tailscaled.service

  # Default applications
  - type: default-flatpaks
    configurations:
      - scope: system
        notify: false
        install:

          # Browser
          - org.mozilla.firefox

          # App store
          - io.github.kolunmi.Bazaar

          # Flatpak management
          - io.github.flattool.Warehouse
          - com.github.tchx84.Flatseal

          # kde apps
          - org.kde.kweather
          - org.kde.kate
          - org.kde.okular
          - org.kde.gwenview



  - type: signing
